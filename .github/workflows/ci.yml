name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoparts
          POSTGRES_USER: autoparts
          POSTGRES_PASSWORD: autoparts
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autoparts -d autoparts"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend checks and tests
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "False"
          DJANGO_DB_ENGINE: postgres
          POSTGRES_DB: autoparts
          POSTGRES_USER: autoparts
          POSTGRES_PASSWORD: autoparts
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000
          WEBPAY_COMMERCE_CODE: test
          WEBPAY_API_KEY: test
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
          python manage.py check
          python manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint frontend
        run: |
          cd frontend
          npm run lint
      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci
      - name: Build frontend
        env:
          REACT_APP_API_URL: http://localhost:8000/api
          REACT_APP_TOKEN_KEY_ACCESS: access
          REACT_APP_TOKEN_KEY_REFRESH: refresh
        run: |
          cd frontend
          npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files
        run: |
          cp .env.example .env
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/health/ > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Backend healthcheck failed"
          docker compose logs backend
          exit 1
      - name: Frontend smoke
        run: curl -fsS http://localhost:3000 > /dev/null
      - name: Shutdown stack
        if: always()
        run: docker compose down -v
