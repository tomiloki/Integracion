services:
  db:
    image: postgres:16-alpine
    container_name: autoparts-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoparts}
      POSTGRES_USER: ${POSTGRES_USER:-autoparts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoparts}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoparts-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoparts}
      POSTGRES_USER: ${POSTGRES_USER:-autoparts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoparts}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BOOTSTRAP_PORTFOLIO: ${BOOTSTRAP_PORTFOLIO:-true}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoparts-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
